# Dependabot configuration for automatic dependency updates.
# See: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # JavaScript/TypeScript dependencies (package.json + package-lock.json at root)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-and-yarn:
        patterns:
          - "*"

  # GitHub Actions used in workflows (pinning updates helps with supply-chain security)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
