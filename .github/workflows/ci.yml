name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.7
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint (ruff)
        run: ruff check src
      - name: Type check (mypy)
        run: mypy src
      - name: Security (bandit)
        run: bandit -q -r src
      - name: Tests
        run: pytest -q

  node:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.7
        with:
          persist-credentials: false
          fetch-depth: 1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: TypeScript check
        run: |
          npx tsc --noEmit
      - name: Lint (eslint)
        run: npx eslint .

  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Run Semgrep
        # Using official CLI (stricter - fails on findings)
        # See: https://semgrep.dev/docs/semgrep-ci/github-actions/
        run: |
          pip install semgrep
          semgrep ci --config=p/ci --config=p/python --config=p/javascript
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }} # optional, remove if not using Semgrep App
